services:
  dev:
    build: .
    container_name: cpp_qt_dev
    ports:
      - "8080:8080"
      - "2222:22"
    volumes:
      - ${DOCKER_COPY_FILES_DIR}/.docker_gitconfig:/home/devuser/.gitconfig:ro
      - ${DOCKER_COPY_FILES_DIR}/.docker_ssh_key:/home/devuser/.ssh/id_ed25519:ro
      - ${DOCKER_COPY_FILES_DIR}/.docker_ssh_key.pub:/home/devuser/.ssh/id_ed25519.pub:ro
      - ${DOCKER_COPY_FILES_DIR}/ReceiptReader/setup-container.sh:/home/devuser/setup-container.sh:ro
      - ${DOCKER_COPY_FILES_DIR}/Pictures/Receipts:/home/devuser/Pictures/Receipts:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    network_mode: host
    stdin_open: true
    tty: true
